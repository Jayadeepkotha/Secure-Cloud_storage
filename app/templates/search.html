<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCS | Secure Vault Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="page-header">
        <div class="brand">
            <span class="brand-mark">SCS</span>
            <div>
                <h1>Secure Search</h1>
                <p>Find encrypted files using keyword-based trapdoor queries.</p>
            </div>
        </div>
        <nav class="main-nav">
            <a href="/">HOME</a>
            <a href="/upload">UPLOAD</a>
            <a href="/search">SEARCH</a>
        </nav>
    </header>

    <main class="page-content">
        <section class="search-panel">
            <div class="complete-search-div">
                <div class="search-card">
                    <h2>Query Vault</h2>
                    <p>Enter a keyword to retrieve matching encrypted records.</p>
                    <div class="search-bar">
                        <input type="text" id="keyword" placeholder="Search by keyword...">
                        <button class="primary-btn" onclick="performSearch()">Query Vault</button>
                    </div>
                    <p id="status-msg" class="status-text"></p>
                </div>
                <div id="results" class="results-grid"></div>
            </div>

            <div class="terminal-window">
                <div class="terminal-header">
                    <span>LIVE CONSOLE</span>
                    <span>● ● ●</span>
                </div>
                <div id="terminalBody" class="terminal-body">
                    <div class="log-entry">Waiting for process...</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let currentResults = [];
        let activeSearchTerm = "";

        async function performSearch() {
            const kwInput = document.getElementById('keyword');
            activeSearchTerm = kwInput.value.trim();
            const resDiv = document.getElementById('results');
            const statusMsg = document.getElementById('status-msg');

            if (!activeSearchTerm) return;
            statusMsg.innerText = 'Searching encrypted vault...';
            resDiv.innerHTML = '';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `keyword=${encodeURIComponent(activeSearchTerm)}`
                });
                const data = await response.json();
                currentResults = data.results || [];

                if (currentResults.length === 0) {
                    statusMsg.innerText = 'No matches found.';
                    return;
                }

                statusMsg.innerText = `${currentResults.length} record(s) matched.`;
                resDiv.innerHTML = currentResults.map((file, index) => `
                    <div class="file-card">
                        <div>
                            <h3>${file.original}</h3>
                            <p>S3 ID: ${file.s3_key.substring(0, 15)}...</p>
                        </div>
                        <button class="primary-btn" onclick="downloadFile(${index})" style="padding: 8px 16px; min-width: auto;">Retrieve</button>
                    </div>
                `).join('');
            } catch (error) { statusMsg.innerText = 'Search failed.'; }
        }

        const terminalBody = document.getElementById('terminalBody');
        const eventSource = new EventSource('/stream-logs');
        eventSource.onmessage = function(event) {
            const newLog = document.createElement('div');
            newLog.className = 'log-entry';
            newLog.innerText = `> ${event.data}`;
            terminalBody.appendChild(newLog);
            terminalBody.scrollTop = terminalBody.scrollHeight;
        };

        async function downloadFile(index) {
            const selected = currentResults[index];
            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({selected, keyword: activeSearchTerm})
                });
                if (!response.ok) {
                const errorData = await response.json();
                alert(`Security/Storage Alert: ${errorData.error}`); // Shows "File not found"
                return;
            }
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = selected.original;
                document.body.appendChild(a); a.click(); a.remove();
            } catch (err) { alert('Download failed'); }
        }

        document.getElementById('keyword').addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
    </script>
</body>
</html>
