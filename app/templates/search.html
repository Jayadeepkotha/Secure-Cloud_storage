<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCS | Secure Vault Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="page-header">
        <div class="brand">
            <span class="brand-mark">SCS</span>
            <div>
                <h1>Secure Search</h1>
                <p>Find encrypted files using keyword-based trapdoor queries.</p>
            </div>
        </div>
        <nav class="main-nav">
            <a href="/">HOME</a>
            <a href="/upload">UPLOAD</a>
            <a href="/search">SEARCH</a>
        </nav>
    </header>

    <main class="page-content">
        <section class="search-panel">
            <div class="search-card">
                <h2>Query Vault</h2>
                <p>Enter a keyword or file identifier to retrieve matching encrypted records.</p>

                <div class="search-bar">
                    <input type="text" id="keyword" placeholder="Search by keyword or ID...">
                    <button class="primary-btn" onclick="performSearch()">Query Vault</button>
                </div>

                <p id="status-msg" class="status-text"></p>
            </div>

            <div id="results" class="results-grid"></div>
        </section>
    </main>

    <script>
        let currentResults = [];
        let activeSearchTerm = "";

        async function performSearch() {
            const kwInput = document.getElementById('keyword');
            activeSearchTerm = kwInput.value.trim();
            const resDiv = document.getElementById('results');
            const statusMsg = document.getElementById('status-msg');

            if (!activeSearchTerm) {
                statusMsg.innerText = 'Please enter a search term.';
                return;
            }

            statusMsg.innerText = 'Searching encrypted vault...';
            resDiv.innerHTML = '';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `keyword=${encodeURIComponent(activeSearchTerm)}`
                });
                const data = await response.json();
                currentResults = data.results || [];

                if (currentResults.length === 0) {
                    statusMsg.innerText = 'No matches found for this query.';
                    resDiv.innerHTML = '<p class="empty-state">No encrypted records match this criteria.</p>';
                    return;
                }

                statusMsg.innerText = `${currentResults.length} record(s) matched.`;
                resDiv.innerHTML = currentResults.map((file, index) => `
                    <div class="file-card">
                        <div>
                            <h3>${file.original}</h3>
                            <p>Encrypted key: ${file.s3_key.substring(0, 24)}...</p>
                        </div>
                        <button onclick="downloadFile(${index})">Retrieve</button>
                    </div>
                `).join('');
            } catch (error) {
                statusMsg.innerText = 'Search failed. Check backend availability.';
            }
        }

        async function downloadFile(index) {
            const selected = currentResults[index];
            const statusMsg = document.getElementById('status-msg');
            statusMsg.innerText = `Requesting file: ${selected.original}...`;

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({selected, keyword: activeSearchTerm})
                });

                if (!response.ok) throw new Error('Download failed');
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = selected.original;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
                statusMsg.innerText = `Downloaded: ${selected.original}`;
            } catch (err) {
                statusMsg.innerText = 'Unable to retrieve file. Please retry.';
            }
        }

        document.getElementById('keyword').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
